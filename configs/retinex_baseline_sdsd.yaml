name: retinex_baseline_sdsd
temporal_type: none  # per-frame RetinexFormer без temporal модуля

model:
  n_feat: 32
  stage: 1
  num_blocks: [1, 1, 1]
  window_size: 1   # baseline не использует окно
  hidden_dim: 64
  n_neurons: 32
  fps: 30.0
  freeze_backbone: false  # baseline обучает backbone полностью
  backbone_lr_scale: 1.0

dataset:
  name: sdsd
  data_root: ./data/SDSD/outdoor_np
  patch_size: 128
  window_size: 5   # датасет всё равно возвращает окно, берём последний кадр
  fps: 30.0
  train_ratio: 0.9
  seed: 42

train:
  batch_size: 4
  num_workers: 2
  epochs: 100
  lr: 0.0002
  lr_min: 0.000001
  warmup_epochs: 5
  save_every: 10
  val_every: 5
  finetune_epoch: null  # baseline не требует двухфазного обучения

loss:
  lambda_pixel: 1.0
  lambda_ssim: 0.1
  lambda_temporal: 0.0  # без temporal loss для baseline

paths:
  checkpoints: ./experiments/checkpoints/baseline_sdsd
  logs: ./experiments/logs/baseline_sdsd
  results: ./experiments/results/baseline_sdsd
