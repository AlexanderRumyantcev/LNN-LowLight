name: retinex_lstm_sdsd
temporal_type: lstm

model:
  n_feat: 32
  stage: 1
  num_blocks: [1, 1, 1]
  window_size: 5
  hidden_dim: 64
  n_neurons: 32
  fps: 30.0
  freeze_backbone: true
  backbone_lr_scale: 0.1

dataset:
  name: sdsd
  data_root: ./data/SDSD/outdoor_np
  patch_size: 128
  window_size: 5
  fps: 30.0
  train_ratio: 0.9
  seed: 42

train:
  batch_size: 4
  num_workers: 2
  epochs: 100
  lr: 0.0002
  lr_min: 0.000001
  warmup_epochs: 5
  save_every: 10
  val_every: 5
  finetune_epoch: 50

loss:
  lambda_pixel: 1.0
  lambda_ssim: 0.1
  lambda_temporal: 0.05

paths:
  checkpoints: ./experiments/checkpoints/lstm_sdsd
  logs: ./experiments/logs/lstm_sdsd
  results: ./experiments/results/lstm_sdsd
